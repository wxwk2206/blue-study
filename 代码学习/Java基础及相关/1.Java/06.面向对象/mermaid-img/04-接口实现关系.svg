<svg viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>接口与实现关系类图</title>
  <desc>Swim 和 Fly 接口，Animal 父类，Dog/Bird/Duck 继承 Animal 并实现接口</desc>
  <defs>
    <marker id="inherit" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1L11 6L1 11Z" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="1"/>
    </marker>
    <marker id="impl" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1L11 6L1 11Z" fill="#FFFFFF" stroke="#534AB7" stroke-width="1"/>
    </marker>
  </defs>

  <text x="340" y="28" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">接口与实现关系</text>

  <g>
    <rect x="30" y="50" width="140" height="64" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="100" y="70" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7" font-style="italic">«interface»</text>
    <text x="100" y="88" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#26215C">Swim</text>
    <line x1="30" y1="98" x2="170" y2="98" stroke="#534AB7" stroke-width="0.5"/>
    <text x="42" y="114" font-family="monospace" font-size="11" fill="#26215C">+ swim()</text>
  </g>

  <g>
    <rect x="270" y="50" width="140" height="64" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="340" y="70" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#185FA5" font-style="italic">«abstract»</text>
    <text x="340" y="88" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53">Animal</text>
    <line x1="270" y1="98" x2="410" y2="98" stroke="#185FA5" stroke-width="0.5"/>
    <text x="282" y="114" font-family="monospace" font-size="11" fill="#042C53">+ eat()</text>
  </g>

  <g>
    <rect x="510" y="50" width="140" height="64" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="580" y="70" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7" font-style="italic">«interface»</text>
    <text x="580" y="88" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#26215C">Fly</text>
    <line x1="510" y1="98" x2="650" y2="98" stroke="#534AB7" stroke-width="0.5"/>
    <text x="522" y="114" font-family="monospace" font-size="11" fill="#26215C">+ fly()</text>
  </g>

  <g>
    <rect x="30" y="300" width="140" height="80" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="100" y="320" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#04342C">Dog</text>
    <line x1="30" y1="332" x2="170" y2="332" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="42" y="350" font-family="monospace" font-size="11" fill="#04342C">+ swim()</text>
  </g>

  <g>
    <rect x="270" y="300" width="140" height="80" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text x="340" y="320" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#412402">Bird</text>
    <line x1="270" y1="332" x2="410" y2="332" stroke="#854F0B" stroke-width="0.5"/>
    <text x="282" y="350" font-family="monospace" font-size="11" fill="#412402">+ fly()</text>
    <text x="282" y="368" font-family="monospace" font-size="11" fill="#412402">+ swim()</text>
  </g>

  <g>
    <rect x="510" y="300" width="140" height="80" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text x="580" y="320" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#4A1B0C">Duck</text>
    <line x1="510" y1="332" x2="650" y2="332" stroke="#993C1D" stroke-width="0.5"/>
    <text x="522" y="350" font-family="monospace" font-size="11" fill="#4A1B0C">+ fly()</text>
    <text x="522" y="368" font-family="monospace" font-size="11" fill="#4A1B0C">+ swim()</text>
  </g>

  <path d="M100 300L100 220L340 220L340 114" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#inherit)"/>
  <path d="M340 300L340 114" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#inherit)"/>
  <path d="M580 300L580 220L340 220" fill="none" stroke="#5F5E5A" stroke-width="1.5"/>
  <text x="350" y="212" font-family="sans-serif" font-size="10" fill="#888780" font-style="italic">extends</text>

  <path d="M70 300L70 180L100 180L100 114" fill="none" stroke="#534AB7" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#impl)"/>

  <path d="M370 300L370 160L580 160L580 114" fill="none" stroke="#534AB7" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#impl)"/>

  <path d="M540 300L540 140L580 140L580 114" fill="none" stroke="#534AB7" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#impl)"/>

  <path d="M620 300L620 200L100 200L100 114" fill="none" stroke="#534AB7" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#impl)"/>

  <text x="20" y="245" font-family="sans-serif" font-size="9" fill="#534AB7" font-style="italic">implements</text>
</svg>

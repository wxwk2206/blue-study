<svg viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Person 继承关系类图</title>
  <desc>Person 父类，Student 和 Teacher 子类继承 Person</desc>
  <defs>
    <marker id="inherit" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1L11 6L1 11Z" fill="#FFFFFF" stroke="#5F5E5A" stroke-width="1"/>
    </marker>
  </defs>

  <text x="340" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">继承关系：Person ← Student / Teacher</text>

  <g>
    <rect x="240" y="50" width="200" height="148" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="340" y="68" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53">Person</text>
    <line x1="240" y1="80" x2="440" y2="80" stroke="#185FA5" stroke-width="0.5"/>
    <text x="252" y="98" font-family="monospace" font-size="12" fill="#042C53">- name: String</text>
    <text x="252" y="116" font-family="monospace" font-size="12" fill="#042C53">- age: int</text>
    <line x1="240" y1="128" x2="440" y2="128" stroke="#185FA5" stroke-width="0.5"/>
    <text x="252" y="146" font-family="monospace" font-size="12" fill="#042C53">+ getName(): String</text>
    <text x="252" y="164" font-family="monospace" font-size="12" fill="#042C53">+ setName(String)</text>
    <text x="252" y="182" font-family="monospace" font-size="12" fill="#042C53">+ getAge(): int</text>
    <text x="252" y="200" font-family="monospace" font-size="12" fill="#042C53">+ setAge(int)</text>
  </g>

  <path d="M170 290L170 240L340 240L340 198" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#inherit)"/>
  <path d="M510 290L510 240L340 240" fill="none" stroke="#5F5E5A" stroke-width="1.5"/>
  <text x="262" y="232" font-family="sans-serif" font-size="11" fill="#5F5E5A" font-style="italic">extends</text>

  <g>
    <rect x="80" y="290" width="180" height="60" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="170" y="308" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#26215C">Student</text>
    <line x1="80" y1="320" x2="260" y2="320" stroke="#534AB7" stroke-width="0.5"/>
    <text x="92" y="338" font-family="monospace" font-size="12" fill="#26215C">+ study()</text>
  </g>

  <g>
    <rect x="420" y="290" width="180" height="60" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="510" y="308" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="500" fill="#26215C">Teacher</text>
    <line x1="420" y1="320" x2="600" y2="320" stroke="#534AB7" stroke-width="0.5"/>
    <text x="432" y="338" font-family="monospace" font-size="12" fill="#26215C">+ teach()</text>
  </g>
</svg>

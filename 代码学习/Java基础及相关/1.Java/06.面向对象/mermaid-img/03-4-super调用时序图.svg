<svg viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>super() 调用时序图</title>
  <desc>JVM 调用 Student 构造，Student 通过 super() 调用 Person 构造，完成后返回</desc>
  <defs>
    <marker id="arrowSolid" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arrowDashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">super() 调用时序图</text>

  <g>
    <rect x="60" y="50" width="100" height="36" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="110" y="68" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#04342C">JVM</text>
  </g>
  <g>
    <rect x="280" y="50" width="120" height="36" rx="4" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="340" y="68" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53">Student()</text>
  </g>
  <g>
    <rect x="510" y="50" width="120" height="36" rx="4" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="570" y="68" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#26215C">Person()</text>
  </g>

  <line x1="110" y1="86" x2="110" y2="310" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="340" y1="86" x2="340" y2="310" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>
  <line x1="570" y1="86" x2="570" y2="310" stroke="#888780" stroke-width="0.5" stroke-dasharray="3 3"/>

  <path d="M110 120L338 120" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrowSolid)"/>
  <text x="224" y="112" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2C2C2A">new Student()</text>

  <path d="M340 170L568 170" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrowSolid)"/>
  <text x="454" y="162" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#2C2C2A">super() 自动调用</text>

  <path d="M570 220L342 220" fill="none" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowDashed)"/>
  <text x="456" y="212" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5F5E5A">父类初始化完成</text>

  <path d="M340 270L112 270" fill="none" stroke="#888780" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrowDashed)"/>
  <text x="226" y="262" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#5F5E5A">子类初始化完成</text>
</svg>

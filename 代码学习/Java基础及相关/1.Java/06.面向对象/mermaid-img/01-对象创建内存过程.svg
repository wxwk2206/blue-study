<svg viewBox="0 0 680 500" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>对象创建的内存过程</title>
  <desc>Student s = new Student() 的 6 步内存分配流程</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="340" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Student s = new Student() 内存创建流程</text>

  <g>
    <rect x="200" y="50" width="280" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
    <text x="340" y="72" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#26215C">1. 加载 Student.class 到方法区</text>
  </g>
  <path d="M340 94L340 116" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="220" y="120" width="240" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
    <text x="340" y="142" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#042C53">2. 在栈中声明变量 s</text>
  </g>
  <path d="M340 164L340 186" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="230" y="190" width="220" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
    <text x="340" y="212" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#04342C">3. 在堆中 new 一块空间</text>
  </g>
  <path d="M340 234L340 256" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="190" y="260" width="300" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
    <text x="340" y="280" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#412402">4. 成员变量赋默认值</text>
    <text x="340" y="302" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#633806">String → null, int → 0</text>
  </g>
  <path d="M340 316L340 338" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="220" y="342" width="240" height="44" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
    <text x="340" y="364" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#4A1B0C">5. 执行构造方法初始化</text>
  </g>
  <path d="M340 386L340 408" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow)"/>

  <g>
    <rect x="200" y="412" width="280" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
    <text x="340" y="432" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="13" font-weight="500" fill="#173404">6. 堆内存地址赋给栈中的 s</text>
    <text x="340" y="454" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-size="12" fill="#27500A">s = 0x0011 (引用地址)</text>
  </g>
</svg>
